# =============================================================================
# Rust test matrix: {carbon, oxide} x {release, staging}.
#
# STATELESS / BAKED model:
#   - Game install + mod framework (+ staging overlay) are baked into each image
#     at BUILD time. No SteamCMD on boot, no named volumes.
#   - Each service builds its OWN image (rust-test-env:<mod>-<branch>) via build
#     args. release vs staging are different game builds; carbon vs oxide diverge
#     at the managed-assembly level -- nothing is shared past the base layers.
#   - Reset = recreate the container. Because there are no volumes, every
#     `up --force-recreate` (or `down && up`) is a guaranteed-fresh install.
#
# Per-server bind mounts (each under ./servers/<container-name>/):
#   plugins/  -> /plugins-src (READ-ONLY)   your deploy target; poll-synced in,
#                                            hot-reload; persists across restarts.
#   config/   -> framework config dir        RESEEDED + wiped every boot.
#   logs/     -> /home/linuxgsm/log          cleared every boot.
# Nothing is shared between servers -- carbon-release and oxide-staging never
# touch the same host folder.
#
# Build (per profile selection):
#   docker compose build carbon-release
#   docker compose --profile all build
# Run:
#   docker compose up -d carbon-release
#   docker compose --profile release up -d
#   docker compose --profile all     up -d --force-recreate   # fresh all four
#
# Ports bind to 127.0.0.1 ONLY:
#   game=BASE/udp rcon=BASE+1/tcp query=BASE+2/udp app=BASE+3/tcp
#   carbon-release 28200  oxide-release 28210  carbon-staging 28220  oxide-staging 28230
# =============================================================================

name: rust-test

x-rust-base: &rust-base
  build:
    context: .
    args:
      UID: ${UID:-1000}
      GID: ${GID:-1000}
  stop_grace_period: 90s
  restart: unless-stopped

x-env: &common-env
  RCON_PASSWORD: ${RCON_PASSWORD:-changeme_local_only}
  MAX_PLAYERS: ${MAX_PLAYERS:-10}
  WORLD_SIZE: ${WORLD_SIZE:-3000}
  SEED: ${SEED:-1337}
  SERVER_LEVEL: ${SERVER_LEVEL:-Procedural Map}

services:
  carbon-release:
    <<: *rust-base
    build:
      context: .
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
        MOD: carbon
        RUST_BRANCH: release
        SEED: ${SEED:-1337}
        WORLD_SIZE: ${WORLD_SIZE:-3000}
        SERVER_LEVEL: ${SERVER_LEVEL:-Procedural Map}
        PREGEN_MAP: ${PREGEN_MAP:-true}
        CACHE_BUST: ${CACHE_BUST:-0}
    image: rust-test-env:carbon-release
    container_name: rust-carbon-release
    profiles: ["carbon", "release", "all"]
    environment:
      <<: *common-env
      PORT_BASE: 28200
      SERVER_NAME: "Carbon - Release - :28200"
    ports:
      - "127.0.0.1:28200:28200/udp"   # game
      - "127.0.0.1:28201:28201/tcp"   # rcon
      - "127.0.0.1:28202:28202/udp"   # query
      - "127.0.0.1:28203:28203/tcp"   # Rust+ app
    volumes:
      - ./servers/rust-carbon-release/plugins:/plugins-src:ro
      - ./servers/rust-carbon-release/config:/home/linuxgsm/serverfiles/carbon/configs
      - ./servers/rust-carbon-release/logs:/home/linuxgsm/log
      - ./servers/rust-carbon-release/refs:/refs-out

  oxide-release:
    <<: *rust-base
    build:
      context: .
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
        MOD: oxide
        RUST_BRANCH: release
        SEED: ${SEED:-1337}
        WORLD_SIZE: ${WORLD_SIZE:-3000}
        SERVER_LEVEL: ${SERVER_LEVEL:-Procedural Map}
        PREGEN_MAP: ${PREGEN_MAP:-true}
        CACHE_BUST: ${CACHE_BUST:-0}
    image: rust-test-env:oxide-release
    container_name: rust-oxide-release
    profiles: ["oxide", "release", "all"]
    environment:
      <<: *common-env
      PORT_BASE: 28210
      SERVER_NAME: "Oxide - Release - :28210"
    ports:
      - "127.0.0.1:28210:28210/udp"
      - "127.0.0.1:28211:28211/tcp"
      - "127.0.0.1:28212:28212/udp"
      - "127.0.0.1:28213:28213/tcp"
    volumes:
      - ./servers/rust-oxide-release/plugins:/plugins-src:ro
      - ./servers/rust-oxide-release/config:/home/linuxgsm/serverfiles/oxide/config
      - ./servers/rust-oxide-release/logs:/home/linuxgsm/log
      - ./servers/rust-oxide-release/refs:/refs-out

  carbon-staging:
    <<: *rust-base
    build:
      context: .
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
        MOD: carbon
        RUST_BRANCH: staging
        SEED: ${SEED:-1337}
        WORLD_SIZE: ${WORLD_SIZE:-3000}
        SERVER_LEVEL: ${SERVER_LEVEL:-Procedural Map}
        PREGEN_MAP: ${PREGEN_MAP:-true}
        CACHE_BUST: ${CACHE_BUST:-0}
    image: rust-test-env:carbon-staging
    container_name: rust-carbon-staging
    profiles: ["carbon", "staging", "all"]
    environment:
      <<: *common-env
      PORT_BASE: 28220
      SERVER_NAME: "Carbon - Staging - :28220"
    ports:
      - "127.0.0.1:28220:28220/udp"
      - "127.0.0.1:28221:28221/tcp"
      - "127.0.0.1:28222:28222/udp"
      - "127.0.0.1:28223:28223/tcp"
    volumes:
      - ./servers/rust-carbon-staging/plugins:/plugins-src:ro
      - ./servers/rust-carbon-staging/config:/home/linuxgsm/serverfiles/carbon/configs
      - ./servers/rust-carbon-staging/logs:/home/linuxgsm/log
      - ./servers/rust-carbon-staging/refs:/refs-out

  oxide-staging:
    <<: *rust-base
    build:
      context: .
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
        MOD: oxide
        RUST_BRANCH: staging
        SEED: ${SEED:-1337}
        WORLD_SIZE: ${WORLD_SIZE:-3000}
        SERVER_LEVEL: ${SERVER_LEVEL:-Procedural Map}
        PREGEN_MAP: ${PREGEN_MAP:-true}
        CACHE_BUST: ${CACHE_BUST:-0}
    image: rust-test-env:oxide-staging
    container_name: rust-oxide-staging
    profiles: ["oxide", "staging", "all"]
    environment:
      <<: *common-env
      PORT_BASE: 28230
      SERVER_NAME: "Oxide - Staging - :28230"
    ports:
      - "127.0.0.1:28230:28230/udp"
      - "127.0.0.1:28231:28231/tcp"
      - "127.0.0.1:28232:28232/udp"
      - "127.0.0.1:28233:28233/tcp"
    volumes:
      - ./servers/rust-oxide-staging/plugins:/plugins-src:ro
      - ./servers/rust-oxide-staging/config:/home/linuxgsm/serverfiles/oxide/config
      - ./servers/rust-oxide-staging/logs:/home/linuxgsm/log
      - ./servers/rust-oxide-staging/refs:/refs-out
